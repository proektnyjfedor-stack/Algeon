name: math_pilot
description: Algeon — математический тренажёр для 5–11 класса
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Локальное хранение
  shared_preferences: ^2.2.2

  # Шрифт
  google_fonts: ^8.0.2

  crypto: ^3.0.6

  # Роутинг
  go_router: ^17.1.0

  # State management
  provider: ^6.1.0

  # Рендеринг LaTeX-формул (дроби, степени, корни)
  flutter_math_fork: ^0.7.2

  # Выбор фото из галереи
  image_picker: ^1.1.2

  # Web interop (replaces deprecated dart:html)
  web: ^1.1.0

  # Звуковые эффекты (web / iOS / Android)
  audioplayers: ^6.1.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.0.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
