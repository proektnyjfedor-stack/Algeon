<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algeon AI Tutor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">Algeon</div>
      <div class="subtitle">Математика с пониманием</div>
    </header>

    <main class="chat-container" id="chat">
      <div class="message bot">
        Привет! Я помощник Algeon. Напиши задачу, и я постараюсь помочь.
      </div>
    </main>

    <footer class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Например: Помоги решить 12 + 8"
      />
      <button id="sendButton">Отправить</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
