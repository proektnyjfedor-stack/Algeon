<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Algeon — математический тренажёр для учеников 1-4 классов">

  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Algeon">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Algeon</title>
  <link rel="manifest" href="manifest.json">

  <!-- Loading Screen Styles -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #000000; }
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background: #ffffff;
      z-index: 9999;
    }

    @media (prefers-color-scheme: dark) {
      .loading-screen { background: #000000; }
    }

    /* Верхняя половина — крупная лестница, подъём снизу вверх */
    .loading-top {
      flex: 1;
      min-height: 45vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .loading-logo {
      width: min(78vw, calc(50vh * 0.92), 480px);
      max-width: 92%;
      aspect-ratio: 1 / 1;
      animation: logoRise 1.35s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
    }

    @keyframes logoRise {
      from {
        transform: translateY(min(42vw, 28vh, 200px));
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .loading-bottom {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px;
      padding-top: 8px;
    }

    .loading-title {
      color: #1E3A8A;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: clamp(28px, 9vmin, 44px);
      font-weight: 800;
      letter-spacing: -1.5px;
      animation: textIn 0.5s ease-out 0.85s both;
    }

    @media (prefers-color-scheme: dark) {
      .loading-title { color: #ffffff; }
    }

    .loading-sub {
      color: #6B7280;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      font-weight: 400;
      margin-top: 10px;
      animation: textIn 0.5s ease-out 0.95s both;
    }

    @media (prefers-color-scheme: dark) {
      .loading-sub { color: #b0b0b0; }
    }

    .loading-stair-fill { fill: #2563EB; }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js" async></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js" async></script>
</head>
<body>
  <!-- Loading Screen (до первого кадра Flutter) -->
  <div class="loading-screen" id="loading">
    <div class="loading-top">
      <div class="loading-logo">
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" aria-hidden="true">
        <!-- Прямые углы: pad=18, step=88, base=282 (как в AppLogo) -->
        <path class="loading-stair-fill" d="M 18,282 L 282,282 L 282,18 L 194,18 L 194,106 L 106,106 L 106,194 L 18,194 Z"/>
        </svg>
      </div>
    </div>
    <div class="loading-bottom">
      <div class="loading-title">Algeon</div>
      <div class="loading-sub">Математика с пониманием</div>
    </div>
  </div>

  <script>
    // Принудительно обновляем сервис-воркер при каждом запуске
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.update(); });
      });

      // If a new service worker takes control, reload to pick up new JS/CSS.
      // This prevents "nothing changed" reports after redeploy.
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }

    // Скрываем загрузочный экран когда Flutter готов
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        // ВАЖНО: сразу убираем pointer-events чтобы невидимый div
        // не перехватывал тач-события пока идёт анимация исчезновения
        loading.style.pointerEvents = 'none';
        loading.style.transition = 'opacity 0.4s ease-out';
        loading.style.opacity = '0';
        // Удаляем из DOM после анимации
        setTimeout(() => { if (loading.parentNode) loading.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
