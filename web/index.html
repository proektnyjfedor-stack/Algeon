<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Algeon — математический тренажёр для учеников 1-4 классов">

  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Algeon">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Algeon</title>
  <link rel="manifest" href="manifest.json">

  <!-- Loading Screen Styles -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #000000; }
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
    }

    @media (prefers-color-scheme: dark) {
      .loading-screen { background: #000000; }
    }

    /* Только надпись Algeon — градиент как во Flutter */
    .loading-brand {
      display: inline-block;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(56px, 16vmin, 92px);
      font-weight: 900;
      letter-spacing: -0.06em;
      /* line-height: 1 обрезает хвосты у g, y, p */
      line-height: 1.22;
      padding: 0.12em 0.04em 0.2em;
      background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: brandIn 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.04s both;
    }

    @supports not (background-clip: text) {
      .loading-brand {
        color: #2563EB;
        -webkit-text-fill-color: #2563EB;
        background: none;
      }
    }

    @keyframes brandIn {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js" async></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js" async></script>
</head>
<body>
  <!-- До первого кадра Flutter — только Algeon -->
  <div class="loading-screen" id="loading">
    <div class="loading-brand">Algeon</div>
  </div>

  <script>
    // Принудительно обновляем сервис-воркер при каждом запуске
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.update(); });
      });

      // If a new service worker takes control, reload to pick up new JS/CSS.
      // This prevents "nothing changed" reports after redeploy.
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }

    // Скрываем загрузочный экран когда Flutter готов
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        // ВАЖНО: сразу убираем pointer-events чтобы невидимый div
        // не перехватывал тач-события пока идёт анимация исчезновения
        loading.style.pointerEvents = 'none';
        loading.style.transition = 'opacity 0.4s ease-out';
        loading.style.opacity = '0';
        // Удаляем из DOM после анимации
        setTimeout(() => { if (loading.parentNode) loading.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
