<body>
  <script>
    // Жестко сбрасываем старые service workers, чтобы после деплоя
    // всегда подтягивалась актуальная web-версия приложения.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        if (!regs.length) return;
        Promise.all(regs.map(function(reg) { return reg.unregister(); }))
          .then(function() {
            if (!sessionStorage.getItem('sw_reset_done')) {
              sessionStorage.setItem('sw_reset_done', '1');
              window.location.reload();
            }
          });
      });
    }
  </script>
